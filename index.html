<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>PS4 Menu Mock</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(#1b4fa3, #0a2a6b);
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    #powerScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .powerBtn {
      padding: 20px 40px;
      font-size: 22px;
      border-radius: 50px;
      border: none;
      background: #0af;
      color: white;
    }

    .container {
      padding: 60px;
    }

    .title {
      font-size: 22px;
      margin-bottom: 40px;
      opacity: 0.9;
    }

    .accounts {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .account {
      width: 140px;
      text-align: center;
      cursor: pointer;
    }

    .avatar {
      width: 140px;
      height: 140px;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 10px;
      transition: 0.2s;
    }

    .account.selected .avatar {
      outline: 3px solid white;
      transform: scale(1.05);
    }

    .name {
      font-size: 16px;
    }

    .addUser {
      font-size: 60px;
    }
  </style>
</head>
<body>

<audio id="startupSound" src="ps4-startup.mp3"></audio>

<div id="powerScreen">
  <button class="powerBtn" onclick="startApp()">Включить</button>
</div>

<div class="container" id="main" style="display:none">
  <div class="title">Кто использует этот контроллер?</div>
  <div class="accounts" id="accounts"></div>
</div>

<script>
  const audio = document.getElementById('startupSound');
  const accountsDiv = document.getElementById('accounts');

  let users = JSON.parse(localStorage.getItem('ps4_users')) || [];
  let selectedIndex = 0;

  function saveUsers() {
    localStorage.setItem('ps4_users', JSON.stringify(users));
  }

  function renderUsers() {
    accountsDiv.innerHTML = '';

    // кнопка добавления всегда первая
    const add = document.createElement('div');
    add.className = 'account';
    add.innerHTML = `
      <div class="avatar addUser">+</div>
      <div class="name">Новый</div>
    `;
    add.onclick = createUser;
    accountsDiv.appendChild(add);

    users.forEach((user, index) => {
      const el = document.createElement('div');
      el.className = 'account' + (index === selectedIndex ? ' selected' : '');

      el.innerHTML = `
        <div class="avatar">${user.icon || '🙂'}</div>
        <div class="name">${user.name}</div>
      `;

      el.onclick = () => selectUser(index);
      accountsDiv.appendChild(el);
    });
  }

  function createUser() {
    const name = prompt('Имя пользователя');
    if (!name) return;

    users.unshift({ name, icon: '🙂' });
    selectedIndex = 0;

    saveUsers();
    renderUsers();
  }

  function selectUser(index) {
    const selected = users.splice(index, 1)[0];
    users.unshift(selected);
    selectedIndex = 0;

    saveUsers();
    renderUsers();
  }

  function startApp() {
    audio.play();

    document.getElementById('powerScreen').style.display = 'none';
    document.getElementById('main').style.display = 'block';

    renderUsers();
  }
</script>

</body>
</html>
